<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>برنامج التقييمات الشهرية</title>

  <style>
    body {
      margin: 0;
      font-family: Tahoma, Arial, sans-serif;
      background: #f3f4f6;
      color: #111827;
    }

    header {
      background: #111827;
      color: white;
      padding: 14px 20px;
      font-size: 22px;
      font-weight: bold;
    }

    nav {
      display: flex;
      gap: 8px;
      background: #e5e7eb;
      padding: 10px;
    }

    nav button {
      padding: 10px 18px;
      border: 0;
      cursor: pointer;
      background: white;
      border-radius: 8px;
      font-weight: bold;
    }

    nav button.active {
      background: #111827;
      color: white;
    }

    main {
      padding: 20px;
    }

    section {
      display: none;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    section.active {
      display: block;
    }

    input, select, textarea {
      padding: 9px;
      margin: 5px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      min-width: 180px;
    }

    button.primary {
      background: #2563eb;
      color: white;
      border: 0;
      border-radius: 6px;
      padding: 10px 16px;
      cursor: pointer;
      margin: 5px;
    }

    button.danger {
      background: #dc2626;
      color: white;
      border: 0;
      border-radius: 6px;
      padding: 8px 12px;
      cursor: pointer;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
      background: white;
    }

    th, td {
      border: 1px solid #e5e7eb;
      padding: 9px;
      text-align: right;
    }

    th {
      background: #f9fafb;
    }

    .row {
      margin-bottom: 10px;
    }
  </style>
</head>

<body>
  <header>برنامج التقييمات الشهرية للموظفين</header>

  <nav>
    <button class="tab active" data-tab="departments">الإدارات</button>
    <button class="tab" data-tab="employees">الموظفين</button>
    <button class="tab" data-tab="evaluations">التقييمات الشهرية</button>
    <button class="tab" data-tab="reports">التقارير</button>
  </nav>

  <main>
    <section id="departments" class="active">
      <h2>الإدارات</h2>

      <div class="row">
        <input id="depName" placeholder="اسم الإدارة" />
        <select id="depParent"></select>
        <input id="depNotes" placeholder="ملاحظات" />
        <button class="primary" onclick="saveDepartment()">حفظ الإدارة</button>
      </div>

      <table>
        <thead>
          <tr>
            <th>الإدارة</th>
            <th>تابعة لـ</th>
            <th>ملاحظات</th>
            <th>حالة</th>
          </tr>
        </thead>
        <tbody id="departmentsTable"></tbody>
      </table>
    </section>

    <section id="employees">
      <h2>الموظفين</h2>

      <div class="row">
        <input id="empNumber" placeholder="رقم الموظف" />
        <input id="empName" placeholder="اسم الموظف" />
        <input id="empNationalId" placeholder="الرقم القومي" />
        <input id="empQualification" placeholder="المؤهل" />
        <input id="empJobTitle" placeholder="الوظيفة" />
        <select id="empDepartment"></select>
        <input id="empNotes" placeholder="ملاحظات" />
        <button class="primary" onclick="saveEmployee()">حفظ الموظف</button>
      </div>

      <div class="row">
        <input id="empSearch" placeholder="بحث بالاسم / الرقم / الرقم القومي" oninput="loadEmployees()" />
        <select id="empFilterDepartment" onchange="loadEmployees()"></select>
      </div>

      <table>
        <thead>
          <tr>
            <th>رقم الموظف</th>
            <th>الاسم</th>
            <th>الرقم القومي</th>
            <th>المؤهل</th>
            <th>الوظيفة</th>
            <th>الإدارة</th>
          </tr>
        </thead>
        <tbody id="employeesTable"></tbody>
      </table>
    </section>

    <section id="evaluations">
      <h2>التقييمات الشهرية</h2>

      <div class="row">
        <select id="evalYear"></select>
        <select id="evalMonth"></select>
        <select id="evalDepartment"></select>
        <button class="primary" onclick="loadEvaluationMonth()">عرض الموظفين</button>
        <button class="primary" onclick="saveEvaluations()">حفظ التقييمات</button>
      </div>

      <table>
        <thead>
          <tr>
            <th>رقم الموظف</th>
            <th>الاسم</th>
            <th>الوظيفة</th>
            <th>الإدارة</th>
            <th>التقييم</th>
            <th>ملاحظات</th>
          </tr>
        </thead>
        <tbody id="evaluationsTable"></tbody>
      </table>
    </section>

    <section id="reports">
      <h2>التقارير</h2>

      <div class="row">
        <select id="reportYear"></select>
        <select id="reportFromMonth"></select>
        <select id="reportToMonth"></select>
        <select id="reportDepartment"></select>
        <button class="primary" onclick="loadReport()">عرض التقرير</button>
        <button class="primary" onclick="window.print()">تصدير PDF / طباعة</button>
      </div>

      <table>
        <thead id="reportHead"></thead>
        <tbody id="reportBody"></tbody>
      </table>
    </section>
  </main>

  <script src="./dist/renderer.js"></script>
</body>
</html>
